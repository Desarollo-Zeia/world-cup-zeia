services:
  postgres:
    image: postgres:16-alpine
    container_name: worldcup-postgres
    environment:
      POSTGRES_USER: worldcup
      POSTGRES_PASSWORD: worldcup123
      POSTGRES_DB: worldcup
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
